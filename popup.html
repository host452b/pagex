<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagex</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app" id="app" data-status="idle">
      <header class="hero">
        <div class="hero__row">
          <span class="hero__flag">SYSTEM.INFORMATION</span>
          <span class="hero__status" id="statusText">SYSTEM.IDLE</span>
        </div>
        <div class="hero__brand">
          <img
            class="hero__logo"
            src="assets/icons/pagex-128.png"
            alt="Pagex PX logo"
          />
          <div class="hero__identity">
            <span class="hero__label">PAGE EXTRACTION / JSON OUTPUT</span>
            <h1 class="hero__title">PAGEX</h1>
          </div>
        </div>
        <p class="hero__subtitle" id="detailText">
          SELECT TARGET TAB. PARSE PAGE STRUCTURE. COPY CLEAN JSON.
        </p>
      </header>

      <section class="panel">
        <label class="field" for="tabSelect">
          <span class="field__label">TARGET.TAB</span>
          <select id="tabSelect" class="field__input"></select>
        </label>

        <div class="actions">
          <button id="parseBtn" class="button button--primary" type="button">
            PARSE
          </button>
          <button
            id="copyBtn"
            class="button button--secondary"
            type="button"
            disabled
          >
            COPY.JSON
          </button>
        </div>
      </section>

      <section class="summary">
        <div class="summary__header">PAYLOAD.METRICS</div>
        <div class="summary__grid">
          <article class="metric">
            <span class="metric__label">FRAMES</span>
            <strong class="metric__value" id="framesValue">-</strong>
          </article>
          <article class="metric">
            <span class="metric__label">ELEMENTS</span>
            <strong class="metric__value" id="elementsValue">-</strong>
          </article>
          <article class="metric">
            <span class="metric__label">CLICKS</span>
            <strong class="metric__value" id="clicksValue">-</strong>
          </article>
          <article class="metric">
            <span class="metric__label">BYTES</span>
            <strong class="metric__value" id="sizeValue">-</strong>
          </article>
        </div>
        <p class="summary__note" id="summaryNote">
          NO PAYLOAD CAPTURED.
        </p>
      </section>

      <footer class="footer">
        <span class="footer__hint" id="copyFeedback">
          LOCAL OUTPUT. NO REMOTE SEND.
        </span>
      </footer>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
